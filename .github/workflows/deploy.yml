name: Deploy to VPS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 82.180.154.75
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/empire-app
            git pull origin main
            npm install
            npm run build
            pm2 restart empire
